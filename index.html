<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SønSpot — 3D Shadow Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne+Mono&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Mono', monospace;
        background: #0d1117;
        color: #e6edf3;
        height: 100vh;
        overflow: hidden;
      }

      #scene-container {
        position: absolute;
        inset: 0;
      }

      canvas { display: block; }

      #controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(13, 17, 23, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid rgba(255, 209, 102, 0.15);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
        z-index: 100;
      }

      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .ctrl-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #8b949e;
        font-family: 'DM Mono', monospace;
      }

      .ctrl-value {
        font-size: 22px;
        font-weight: 500;
        color: #FFD166;
        font-family: 'Syne Mono', monospace;
      }

      #date-picker {
        background: rgba(255, 209, 102, 0.08);
        border: 1px solid rgba(255, 209, 102, 0.25);
        color: #FFD166;
        padding: 6px 10px;
        border-radius: 6px;
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        cursor: pointer;
        outline: none;
      }
      #date-picker:focus { border-color: #FFD166; }

      .slider-wrap {
        flex: 1;
        min-width: 200px;
        max-width: 480px;
        position: relative;
      }

      #time-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: #21262d;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
        margin-top: 4px;
      }

      #time-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #FFD166;
        cursor: pointer;
        box-shadow: 0 0 8px rgba(255, 209, 102, 0.5);
      }

      #time-slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #FFD166;
        cursor: pointer;
        border: none;
      }

      .slider-markers {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        color: #8b949e;
        margin-top: 2px;
        font-family: 'DM Mono', monospace;
      }

      #play-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #FFD166;
        color: #0d1117;
        border: none;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s, box-shadow 0.15s;
        flex-shrink: 0;
      }
      #play-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 16px rgba(255, 209, 102, 0.4);
      }

      #sun-status {
        font-size: 13px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 20px;
        font-family: 'DM Mono', monospace;
        white-space: nowrap;
        transition: background 0.3s, color 0.3s;
      }
      #sun-status.in-sun {
        background: rgba(255, 209, 102, 0.15);
        color: #FFD166;
      }
      #sun-status.in-shadow {
        background: rgba(139, 148, 158, 0.15);
        color: #8b949e;
      }

      .opacity-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #shadow-opacity-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 80px;
        height: 3px;
        background: #21262d;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      #shadow-opacity-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #8b949e;
        cursor: pointer;
      }

      #loading-overlay {
        position: fixed;
        inset: 0;
        background: #0d1117;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        transition: opacity 0.6s;
      }
      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-text {
        font-family: 'Syne Mono', monospace;
        font-size: 18px;
        color: #FFD166;
        margin-top: 16px;
      }
      .loading-sub {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: #8b949e;
        margin-top: 8px;
      }

      @keyframes pulse-ring {
        0% { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(2.4); opacity: 0; }
      }
      .loading-ring {
        width: 40px;
        height: 40px;
        border: 2px solid #FFD166;
        border-radius: 50%;
        animation: pulse-ring 1.2s ease-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <div class="loading-ring"></div>
      <div class="loading-text">SønSpot</div>
      <div class="loading-sub">Loading terrain data…</div>
    </div>

    <div id="scene-container"></div>

    <div id="controls">
      <div class="ctrl-group">
        <span class="ctrl-label">Time</span>
        <span class="ctrl-value" id="time-display">12:00</span>
      </div>

      <div class="ctrl-group">
        <span class="ctrl-label">Date</span>
        <input type="date" id="date-picker" />
      </div>

      <button id="play-btn" title="Play sunrise → sunset">&#9654;</button>

      <div class="slider-wrap">
        <span class="ctrl-label">Scrub</span>
        <input type="range" id="time-slider" min="0" max="1439" value="720" />
        <div class="slider-markers">
          <span id="sunrise-label">--:--</span>
          <span id="sunset-label">--:--</span>
        </div>
      </div>

      <span id="sun-status" class="in-sun">☀ IN SUN</span>

      <div class="opacity-group">
        <span class="ctrl-label">Shadow</span>
        <input type="range" id="shadow-opacity-slider" min="0" max="100" value="70" />
      </div>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <script src="app.js"></script>
  </body>
</html>
