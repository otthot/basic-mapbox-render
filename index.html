<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SønSpot — Shadow Engine Prototype</title>
    <link
      href="node_modules/mapbox-gl/dist/mapbox-gl.css"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; height: 100vh; display: flex; flex-direction: column; }

      #map-wrap { flex: 1; position: relative; }
      #map { position: absolute; inset: 0; }

      /* Shadow canvas overlaid on map — sibling of map div, same stacking context */
      #shadow-canvas {
        position: absolute;
        top: 0; left: 0;
        pointer-events: none;
        z-index: 10;
      }

      /* Control panel */
      #controls {
        background: #1a1a1a;
        border-top: 1px solid #333;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 24px;
        flex-wrap: wrap;
      }

      .ctrl-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .ctrl-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #888;
      }

      .ctrl-value {
        font-size: 15px;
        font-weight: 600;
        color: #f0c040;
      }

      #time-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 260px;
        height: 4px;
        background: #444;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }

      #time-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px; height: 16px;
        border-radius: 50%;
        background: #f0c040;
        cursor: pointer;
      }

      /* Sun dial */
      #sun-dial-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      #sun-dial {
        width: 64px; height: 64px;
      }

      .sun-stats {
        display: flex;
        gap: 16px;
      }

      .sun-stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .stat-val {
        font-size: 14px;
        font-weight: 700;
        color: #f0c040;
      }

      .stat-lbl {
        font-size: 10px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      #status {
        font-size: 12px;
        color: #666;
        margin-left: auto;
      }

      #compute-btn {
        background: #f0c040;
        color: #0f0f0f;
        border: none;
        padding: 8px 18px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.04em;
      }

      #compute-btn:hover { background: #ffd84d; }
      #compute-btn:disabled { background: #555; color: #999; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="map-wrap">
      <div id="map"></div>
      <canvas id="shadow-canvas"></canvas>
    </div>

    <div id="controls">
      <!-- Time slider -->
      <div class="ctrl-group">
        <span class="ctrl-label">Time of day</span>
        <input type="range" id="time-slider" min="0" max="1439" value="720" />
        <span class="ctrl-value" id="time-display">12:00</span>
      </div>

      <!-- Sun dial -->
      <div id="sun-dial-wrap">
        <canvas id="sun-dial" width="64" height="64"></canvas>
        <div class="sun-stats">
          <div class="sun-stat">
            <span class="stat-val" id="stat-az">—</span>
            <span class="stat-lbl">Azimuth</span>
          </div>
          <div class="sun-stat">
            <span class="stat-val" id="stat-alt">—</span>
            <span class="stat-lbl">Altitude</span>
          </div>
        </div>
      </div>

      <button id="compute-btn">Compute Shadows</button>

      <span id="status">Load the DSM first with: node prepare-dsm.js</span>
    </div>

    <script src="node_modules/mapbox-gl/dist/mapbox-gl.js"></script>
    <script src="node_modules/suncalc/suncalc.js"></script>
    <script src="public/env.js"></script>
    <script src="app.js"></script>
  </body>
</html>
