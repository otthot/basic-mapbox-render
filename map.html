<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SønSpot — Explore Locations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Mono', monospace;
        background: #0d1117;
        color: #e6edf3;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 16px 24px;
        display: flex;
        align-items: baseline;
        gap: 12px;
        z-index: 500;
        position: relative;
      }

      header h1 {
        font-family: 'DM Mono', monospace;
        font-weight: 300;
        font-size: 18px;
        color: #FFD166;
      }

      header p {
        font-size: 12px;
        color: #8b949e;
      }

      #map {
        flex: 1;
        z-index: 1;
      }

      .leaflet-container {
        background: #0d1117;
      }

      .location-pin {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
      }

      .pin-dot {
        width: 18px;
        height: 18px;
        background: #FFD166;
        border: 3px solid #0d1117;
        border-radius: 50%;
        box-shadow: 0 0 12px rgba(255, 209, 102, 0.5);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .pin-dot:hover {
        transform: scale(1.3);
        box-shadow: 0 0 20px rgba(255, 209, 102, 0.8);
      }

      .pin-pulse {
        position: absolute;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255, 209, 102, 0.3);
        animation: pulse 2s ease-out infinite;
        pointer-events: none;
      }

      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(2.5); opacity: 0; }
      }

      .pin-label {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: #e6edf3;
        background: rgba(13, 17, 23, 0.9);
        padding: 3px 8px;
        border-radius: 4px;
        border: 1px solid rgba(255, 209, 102, 0.2);
        margin-top: 4px;
        white-space: nowrap;
        pointer-events: none;
      }

      .leaflet-tile-pane { filter: saturate(0.3) brightness(0.6); }
    </style>
  </head>
  <body>
    <header>
      <h1>SønSpot</h1>
      <p>Select a location to explore shadows</p>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      (async function () {
        const res = await fetch('public/locations.json');
        const locations = await res.json();

        const map = L.map('map', {
          center: [55.691, 12.559],
          zoom: 16,
          zoomControl: false,
        });

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
          maxZoom: 19,
        }).addTo(map);

        locations.forEach(loc => {
          const icon = L.divIcon({
            className: 'location-pin',
            html: `<div class="pin-pulse"></div><div class="pin-dot"></div><div class="pin-label">${loc.name}</div>`,
            iconSize: [120, 44],
            iconAnchor: [60, 9],
          });

          const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
          marker.on('click', () => {
            window.location.href = `index.html?location=${loc.id}`;
          });
        });
      })();
    </script>
  </body>
</html>
