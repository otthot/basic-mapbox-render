<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SønSpot — Choose Location</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="public/env.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Mono', monospace;
        background: #0d1117;
        color: #e6edf3;
        height: 100vh;
        overflow: hidden;
      }

      #map { width: 100%; height: 100%; }

      #header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        text-align: center;
        padding: 20px 16px 32px;
        background: linear-gradient(to bottom, rgba(13,17,23,0.92) 60%, transparent);
        pointer-events: none;
      }

      #header h1 {
        font-family: 'DM Mono', monospace;
        font-weight: 300;
        font-size: 18px;
        color: #FFD166;
      }

      #header p {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: #8b949e;
        margin-top: 4px;
      }

      .mapboxgl-popup-content {
        background: rgba(13, 17, 23, 0.95) !important;
        color: #e6edf3 !important;
        font-family: 'DM Mono', monospace !important;
        font-size: 12px !important;
        padding: 12px 16px !important;
        border-radius: 8px !important;
        border: 1px solid rgba(255, 209, 102, 0.2) !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
      }

      .mapboxgl-popup-tip {
        border-top-color: rgba(13, 17, 23, 0.95) !important;
      }

      .mapboxgl-popup-close-button {
        color: #8b949e !important;
        font-size: 16px !important;
      }

      .popup-name {
        color: #FFD166;
        font-weight: 500;
        font-size: 13px;
        margin-bottom: 6px;
      }

      .popup-coords {
        color: #8b949e;
        font-size: 10px;
      }

      .popup-link {
        display: inline-block;
        margin-top: 8px;
        color: #0d1117;
        background: #FFD166;
        padding: 4px 12px;
        border-radius: 4px;
        text-decoration: none;
        font-size: 11px;
        font-weight: 500;
        transition: opacity 0.2s;
      }

      .popup-link:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div id="header">
      <h1>SønSpot</h1>
      <p>Select a location to view 3D shadows</p>
    </div>
    <div id="map"></div>

    <script>
      (async function () {
        mapboxgl.accessToken = window.MAPBOX_TOKEN;

        const locations = await fetch('public/locations.json').then(r => r.json());

        const map = new mapboxgl.Map({
          container: 'map',
          style: 'mapbox://styles/mapbox/dark-v11',
          center: [12.5588, 55.6915],
          zoom: 15.5,
        });

        map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

        map.on('load', () => {
          for (const loc of locations) {
            const el = document.createElement('div');
            el.style.cssText =
              'width:28px;height:28px;background:#FFD166;border:3px solid #0d1117;' +
              'border-radius:50%;cursor:pointer;box-shadow:0 2px 8px rgba(255,209,102,0.4);' +
              'transition:transform 0.2s;';
            el.addEventListener('mouseenter', () => (el.style.transform = 'scale(1.2)'));
            el.addEventListener('mouseleave', () => (el.style.transform = 'scale(1)'));

            const popup = new mapboxgl.Popup({ offset: 20, closeButton: false }).setHTML(
              '<div class="popup-name">' + loc.name + '</div>' +
              '<div class="popup-coords">' + loc.lat.toFixed(4) + '°N, ' + loc.lng.toFixed(4) + '°E</div>' +
              '<a href="index.html?location=' + loc.id + '" class="popup-link">View Shadows →</a>'
            );

            new mapboxgl.Marker({ element: el })
              .setLngLat([loc.lng, loc.lat])
              .setPopup(popup)
              .addTo(map);
          }
        });
      })();
    </script>
  </body>
</html>
